
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <title>公益 404 - yeluogui.cloud</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      align-items: center;
      background: #f6f7fb;
      color: #111;
      display: flex;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      padding: 18px;
    }

    .page {
      max-width: 760px;
      text-align: center;
      width: 100%;
    }

    .charity-image {
      background: #fff;
      border: 1px solid rgba(0, 0, 0, .08);
      border-radius: 14px;
      box-shadow: 0 18px 42px rgba(20, 24, 32, .1);
      display: block;
      max-height: 78vh;
      max-width: 100%;
      object-fit: contain;
      padding: 8px;
      width: 100%;
    }

    .status {
      color: #5f6676;
      font-size: .92rem;
      line-height: 1.7;
      margin: 14px auto 0;
    }

    .home {
      border: 1px solid #111;
      border-radius: 999px;
      display: inline-flex;
      font-size: .9rem;
      font-weight: 800;
      margin-top: 12px;
      min-height: 36px;
      padding: 0 16px;
      align-items: center;
      color: #111;
      text-decoration: none;
    }

    .home:hover {
      background: #111;
      color: #fff;
    }
  </style>
</head>
<body>
  <main class="page">
    <img id="charity-image" class="charity-image" alt="公益 404 图片" referrerpolicy="no-referrer">
    <p id="status" class="status">正在加载公益 404 图片...</p>
    <a class="home" href="/">返回首页</a>
  </main>

  <script>
    (function() {
      var imageApi = 'https://openapi.dwo.cc/api/babygome';
      var image = document.getElementById('charity-image');
      var status = document.getElementById('status');

      image.onload = function() {
        status.textContent = '页面不存在，先看看这张公益 404。';
      };
      image.onerror = function() {
        image.style.display = 'none';
        status.textContent = '公益图片接口暂时无法加载，页面不存在。';
      };
      image.src = imageApi + '?t=' + Date.now();
    })();
  </script>
</body>
</html>
